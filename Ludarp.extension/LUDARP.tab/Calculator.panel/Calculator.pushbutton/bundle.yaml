title: Calculator
tooltip: >
  Extract and calculate values from Levels, Dimensions, Spot Elevations, or points.
  Includes unit conversion and math operations.

description: |
  Quickly measure and calculate numeric values by picking two Revit elements 
  (Levels, Dimensions, Spot Elevations) or points. 

  Workflow:
  1. Pick the first source (Level, Dimension, Spot, or point).
  2. Pick the second source.
  3. Choose an operation: A-B, A+B, A*B, A/B.
  4. Options:
     - Convert units (m, cm, mm, ft, fi)
     - Copy numeric result to clipboard.

