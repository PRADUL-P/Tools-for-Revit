title: Calculator
tooltip: Extract and calculate values from Levels, Dimensions, Spot Elevations, or points.
  
  Description 
  Quickly measure and calculate numeric values by picking two Revit elements 
  (Levels, Dimensions, Spot Elevations) or points. Supports math operations, 
  unit conversion, and copying results to clipboard.

  How to Use
  1. Click the tool button.
  2. Pick the first source (Level, Dimension, Spot, or point).
  3. Pick the second source.
  4. Choose an operation - A-B, A+B, A*B, A/B.
  5. View result in project units.
  6. Options
       - Convert units (m, cm, mm, ft, fi)
       - Copy Result copies the numeric value
       - Close - exit

